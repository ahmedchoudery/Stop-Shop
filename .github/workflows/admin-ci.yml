name: Railway Admin API CI (Patch 9 Lean)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-admin-api:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./web-app-next/railway-admin-api

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm install
      
    - name: Run Jest Unit & Integration Tests (ESM)
      run: npm test
