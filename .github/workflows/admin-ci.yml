name: Railway Admin API CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-admin-api:
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: "mongodb://127.0.0.1:27017/stop_shop_test"
      MONGO_URL: "mongodb://127.0.0.1:27017/stop_shop_test"
      JWT_SECRET: "ci_testing_secret_key"
      RBAC_STAGE: "dev"
      NODE_ENV: "test"

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install Dependencies
      run: npm install

    - name: Run Jest Unit & Integration Tests (ESM)
      run: npm test
