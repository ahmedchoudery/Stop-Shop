name: Railway Admin API CI (Patch 9 Lean)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-admin-api:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      MONGODB_URI: "mongodb://127.0.0.1:27017/stop_shop_test"
      MONGO_URL: "mongodb://127.0.0.1:27017/stop_shop_test"
      JWT_SECRET: "ci_testing_secret_key"
      RBAC_STAGE: "dev"

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: ./web-app-next/railway-admin-api

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm install
      
    - name: Run Jest Unit & Integration Tests (ESM)
      run: npm test
