<html lang="en">

    <!-- Primary Meta Tags -->
    <title>Stop & Shop | Premium Clothing & Fashion</title>

    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://stop-shop-gamma.vercel.app/" />

        "@type": "ContactPoint",

      },

    <!-- Structured Data - WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "Stop & Shop",
      "url": "https://stop-shop-gamma.vercel.app",
